services:
  dev:
    build:
      context: .
      args:
        DOTFILES_REPO: ${DOTFILES_REPO}
        DOTFILES_REF: ${DOTFILES_REF:-main}
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        DOCKER_GID: ${DOCKER_GID:-999}
    image: my-devbox:latest
    command: sleep infinity # keep the container alive so we can exec in
    working_dir: /workspace
    environment:
      - TERM=${TERM:-tmux-256color} # pass terminal type through for colors/keys
      - COLORTERM=truecolor
    volumes:
      # --- your project code (set PROJECTS_DIR in .env) ---
      # Mounted into a subfolder, not straight onto /workspace, so a second
      # folder (e.g. one you `docker cp` in separately) can live alongside it
      # without sharing this mount's host ownership.
      - ${PROJECTS_DIR:-../projects}:/workspace/Mounted

      # --- persist Neovim plugins + Mason binaries across rebuilds ---
      - nvim-data:/home/dev/.local/share/nvim
      - nvim-state:/home/dev/.local/state/nvim
      - nvim-undo:/home/dev/.vim/undodir

      # --- secrets / auth, mounted read-only (never baked into the image) ---
      # ~/.gitconfig itself is symlinked from dotfiles (shared, non-identifying
      # settings). Only the identity/host-specific overrides live here.
      - ${HOME}/.gitconfig.local:/home/dev/.gitconfig.local:ro
      - ${HOME}/.ssh:/home/dev/.ssh:ro
      # intelephense license — lsp.lua reads ~/.config/intelephense/license.txt at runtime:
      - ${HOME}/.config/intelephense:/home/dev/.config/intelephense:ro

      # --- host/VM docker socket (lets docker CLI in the container see and
      # control sibling containers on the host — same access level as root
      # on the host, since anyone who can reach the socket can escape to it) ---
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  nvim-data:
  nvim-state:
  nvim-undo:
